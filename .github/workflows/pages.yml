name: Deploy to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ["main", "opt_4"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: 📥 Скачивание кода
      uses: actions/checkout@v4

    - name: ⚙️ Настройка Node.js 24
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: 📦 Установка зависимостей
      run: npm install

    - name: 🎨 Сборка стилей Tailwind CSS v4
      run: npm run build:css

    - name: 🏷️ Обновление версии (Cache Busting)
      run: |
        # Заменяем VERSION во всех HTML и JS файлах внутри папки www
        find ./www -type f \( -name "*.html" -o -name "*.js" \) -exec sed -i "s/VERSION/${{ github.run_id }}/g" {} +

    - name: 🌐 Настройка GitHub Pages
      uses: actions/configure-pages@v4

    - name: 📤 Загрузка папки www
      uses: actions/upload-pages-artifact@v3
      with:
        path: './www'

    - name: 🚀 Публикация сайта
      id: deployment
      uses: actions/deploy-pages@v4