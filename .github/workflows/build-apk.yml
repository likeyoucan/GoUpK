name: Build Android APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ["main", "mb_8"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Скачивание кода
      uses: actions/checkout@v4

    - name: ⚙️ Настройка Node.js 24
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: ☕ Настройка Java 21
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '25'
        cache: 'gradle' # Автоматически кэширует Gradle wrapper и зависимости

    - name: 📦 Установка зависимостей
      run: npm install

    - name: 🎨 Сборка стилей Tailwind CSS v4
      run: npm run build:css

    - name: 📱 Синхронизация Capacitor
      run: npx cap sync android

    - name: 🔨 Сборка APK
      working-directory: ./android
      run: |
        chmod +x ./gradlew
        ./gradlew assembleDebug --no-daemon

    - name: 📦 Сохранение готового APK
      uses: actions/upload-artifact@v4
      with:
        name: StopwatchPro-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7