name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

# Это дает роботу право сохранять файлы обратно в ваш репозиторий
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Скачивание кода
      uses: actions/checkout@v4

    - name: ⚙️ Настройка Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: 🎨 Сборка стилей Tailwind
      run: |
        npm install @tailwindcss/cli
        npx @tailwindcss/cli -i ./input.css -o ./www/styles.css --minify

    - name: 📱 Создание папки Android
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android
        # Инициализируем проект, если его нет
        npx cap init "My App" "com.example.myapp" --web-dir=www
        # Пытаемся добавить платформу android (если она уже есть, пропустим ошибку)
        npx cap add android || true

    - name: 💾 Сохранение папки android в GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add android
        git add package.json package-lock.json # сохраним и зависимости
        git commit -m "chore: добавлена постоянная папка android проекта" || echo "No changes to commit"
        git push

    - name: ☕ Настройка Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: 🔨 Сборка APK
      working-directory: ./android
      run: |
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: 📦 Сохранение готового APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
