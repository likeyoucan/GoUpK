name: Build Android APK

# Эта строчка уберет предупреждение про Node.js 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ["main", "dev", "alpha"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Скачивание кода
      uses: actions/checkout@v4

    - name: ⚙️ Настройка Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: ☕ Настройка Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: 📦 Установка зависимостей
      run: npm install

    - name: 🎨 Сборка стилей Tailwind CSS v4
      run: npm run build:css

    - name: 📱 Синхронизация Capacitor
      run: npm run cap:sync

    - name: 🔨 Сборка APK
      working-directory: ./android
      run: |
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: 📦 Сохранение готового APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk-${{ github.sha }}
        path: android/app/build/outputs/apk/debug/app-debug.apk