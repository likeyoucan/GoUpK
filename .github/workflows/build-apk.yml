name: Build Android APK

# Настройки параллелизма, все отлично.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ["main", "dev", "alpha"] # Рекомендую оставить только 'main' для сборки релизных/тестовых версий
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Скачивание кода репозитория
        uses: actions/checkout@v4

      # ИСПРАВЛЕНО: Кэшируем и NPM, и Gradle зависимости
      - name: ⚙️ Настройка Node.js и кэширование NPM
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Рекомендую использовать ту же версию, что и в pages.yml для консистентности
          cache: 'npm'

      - name: ☕ Настройка Java и кэширование Gradle
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Capacitor 6 / последняя версия Android Studio требует JDK 17
          cache: 'gradle' # Включаем кэширование Gradle - это ОЧЕНЬ ускорит сборку

      # ИСПРАВЛЕНО: Один шаг для установки всех JS зависимостей
      - name: 📦 Установка JS зависимостей
        run: npm install

      # ИСПРАВЛЕНО: Используем скрипт из package.json
      - name: 🎨 Сборка стилей Tailwind CSS
        run: npm run build:css
      
      # ИСПРАВЛЕНО: Используем скрипт из package.json для Capacitor
      - name: 📱 Синхронизация Capacitor (Web -> Android)
        # Эта команда запустит "cap:sync": "npx cap sync android" из вашего package.json
        run: npm run cap:sync

      - name: 🔨 Сборка отладочного APK (Debug)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      # ИЗМЕНЕНО: Добавлено хранение версии в имени файла
      - name: 📤 Сохранение готового APK
        uses: actions/upload-artifact@v4
        with:
          # Добавляем SHA коммита в имя файла, чтобы легко отличать сборки
          name: stopwatch-pro-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk