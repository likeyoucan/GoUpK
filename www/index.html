<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover"
    />

    <!-- CSP для мобильных приложений -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: capacitor: ionic: http://localhost; font-src 'self' data:; connect-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;"
    />

    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#f3f4f6"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#000000"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <title>Stopwatch Pro</title>

    <link rel="stylesheet" href="js-check.css" />
    <link rel="stylesheet" href="styles.css" />
    <script src="./js/js-check.js"></script>
  </head>

  <body
    class="preload flex items-center justify-center h-[100dvh] w-full overflow-hidden bg-black text-base select-none"
  >
    <div id="sr-only-announce" aria-live="polite" class="sr-only"></div>

    <!-- Уведомление (Toast) -->
    <div
      id="toast"
      role="status"
      class="fixed left-1/2 transform -translate-x-1/2 app-surface border app-border app-text px-6 py-3 rounded-full shadow-2xl z-[150] transition-all duration-300 opacity-0 -translate-y-4 pointer-events-none flex items-center gap-3"
    >
      <svg
        class="w-5 h-5 primary-text"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        stroke-width="2.5"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M5 13l4 4L19 7"
        ></path>
      </svg>
      <span id="toast-msg" class="font-bold text-sm tracking-wide"></span>
    </div>

    <div
      id="app"
      class="relative overflow-hidden flex flex-col bg-black transition-shadow duration-300"
    >
      <div
        class="app-bg absolute inset-0 flex flex-col w-full h-full z-0 transition-colors duration-300"
      >
        <main class="flex-1 relative overflow-hidden z-10" id="viewsContainer">
          <!-- ═══════════════════════════════════════════
             STOPWATCH VIEW (ПЛАНШЕТ: Split Screen)
        ═══════════════════════════════════════════ -->
          <div
            id="view-stopwatch"
            class="absolute inset-0 flex flex-col md:flex-row transition-opacity duration-300 z-10"
          >
            <!-- ЛЕВАЯ ЧАСТЬ: Круг -->
            <div
              class="view-top-half w-full md:w-1/2 h-[55%] md:h-full flex flex-col items-center justify-center shrink-0 px-6"
            >
              <h2
                class="text-sm font-bold app-text-sec uppercase tracking-widest"
                data-i18n="stopwatch"
              >
                Stopwatch
              </h2>
              <div
                class="timer-circle-wrap relative shrink-0 flex items-center justify-center"
                data-ring="sw"
              >
                <button
                  type="button"
                  id="sw-startStopBtn"
                  class="absolute inset-0 flex flex-col items-center justify-center rounded-full focus:outline-none active:scale-95 transition-transform overflow-hidden cursor-pointer"
                >
                  <div
                    id="sw-lapFlash"
                    class="absolute inset-0 rounded-full primary-bg opacity-0 pointer-events-none"
                  ></div>
                  <span
                    id="sw-statusText"
                    class="hidden text-sm font-bold tracking-widest uppercase mb-1 app-text-sec relative z-10"
                    >PAUSE</span
                  >
                  <span
                    id="sw-mainDisplay"
                    class="font-mono font-bold tracking-tighter tabular-nums primary-text timer-display is-go relative z-10"
                    >GO</span
                  >
                  <span
                    id="sw-extendedDisplay"
                    class="hidden font-bold app-text-sec text-sm mt-1 relative z-10"
                  ></span>
                </button>
              </div>
            </div>

            <!-- ПРАВАЯ ЧАСТЬ: История -->
            <div
              class="view-bottom-half h-[45%] md:h-full w-full md:w-1/2 flex flex-col shrink-0 min-h-0 md:border-l app-border"
            >
              <div class="w-full flex justify-center h-14 shrink-0 mb-2 mt-4">
                <button
                  type="button"
                  id="sw-lapBtn"
                  class="hidden app-surface app-text w-32 min-h-[44px] rounded-full text-lg font-bold shadow-sm active:scale-95 transition-transform focus:outline-none"
                >
                  Lap
                </button>
              </div>
              <div
                class="flex-1 flex flex-col min-h-0 border-t app-border pt-2 px-4"
              >
                <div class="flex justify-between items-center mb-1 px-2">
                  <h3
                    class="text-xs font-bold app-text-sec uppercase tracking-wider"
                  >
                    Laps History
                  </h3>
                  <div class="flex items-center gap-1">
                    <button
                      id="sw-saveBtn"
                      class="hidden p-2 text-gray-400 hover:primary-text"
                    >
                      <svg
                        class="w-5 h-5"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                      >
                        <path
                          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
                        ></path>
                      </svg>
                    </button>
                    <button id="sw-openResultsBtn" class="p-2 text-gray-400">
                      <svg
                        class="w-5 h-5"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                      >
                        <path
                          d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"
                        ></path>
                      </svg>
                    </button>
                  </div>
                </div>
                <div
                  id="sw-lapsContainer"
                  class="scroll-list flex-1 overflow-y-auto no-scrollbar px-1"
                >
                  <div class="text-center app-text-sec opacity-50 mt-4 text-sm">
                    No laps recorded
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- ═══════════════════════════════════════════
             TIMER VIEW (ПЛАНШЕТ: Split Screen)
        ═══════════════════════════════════════════ -->
          <div
            id="view-timer"
            inert
            class="absolute inset-0 flex flex-col md:flex-row transition-opacity duration-300 opacity-0 pointer-events-none"
          >
            <div
              class="view-top-half w-full md:w-1/2 h-[55%] md:h-full flex flex-col items-center justify-center shrink-0"
            >
              <h2
                class="text-sm font-bold app-text-sec uppercase tracking-widest"
              >
                Countdown
              </h2>
              <div
                class="timer-circle-wrap relative shrink-0 flex items-center justify-center"
                data-ring="tm"
              >
                <button
                  type="button"
                  id="tm-circleBtn"
                  class="absolute inset-0 flex flex-col items-center justify-center rounded-full"
                >
                  <span
                    id="tm-mainDisplay"
                    class="font-mono font-bold tracking-tighter primary-text timer-display is-go"
                    >GO</span
                  >
                </button>
              </div>
            </div>
            <div
              class="view-bottom-half h-[45%] md:h-full w-full md:w-1/2 flex flex-col items-center justify-center shrink-0 md:border-l app-border px-6"
            >
              <form id="tm-form" class="flex flex-col items-center w-full">
                <div id="tm-inputs" class="flex items-center gap-2">
                  <input
                    type="text"
                    inputmode="numeric"
                    id="tm-h"
                    placeholder="00"
                    class="timer-input w-16 h-16 text-center bg-transparent border-b-2 app-border outline-none"
                  />
                  <span class="text-4xl opacity-30">:</span>
                  <input
                    type="text"
                    inputmode="numeric"
                    id="tm-m"
                    placeholder="00"
                    class="timer-input w-16 h-16 text-center bg-transparent border-b-2 app-border outline-none"
                  />
                  <span class="text-4xl opacity-30">:</span>
                  <input
                    type="text"
                    inputmode="numeric"
                    id="tm-s"
                    placeholder="00"
                    class="timer-input w-16 h-16 text-center bg-transparent border-b-2 app-border outline-none"
                  />
                </div>
                <button
                  type="button"
                  id="tm-resetBtn"
                  class="hidden mt-8 app-surface app-text px-8 py-2 rounded-full font-bold"
                >
                  Reset
                </button>
              </form>
            </div>
          </div>

          <!-- ═══════════════════════════════════════════
             TABATA VIEW (ПЛАНШЕТ: Split Screen)
        ═══════════════════════════════════════════ -->
          <div
            id="view-tabata"
            inert
            class="absolute inset-0 flex flex-col md:flex-row transition-opacity duration-300 opacity-0 pointer-events-none"
          >
            <div
              class="view-top-half w-full md:w-1/2 h-[55%] md:h-full flex flex-col items-center justify-center shrink-0"
            >
              <h2
                class="text-sm font-bold app-text-sec uppercase tracking-widest"
              >
                Tabata
              </h2>
              <div
                class="timer-circle-wrap relative shrink-0 flex items-center justify-center"
                data-ring="tb"
              >
                <button
                  id="tb-startBtn"
                  class="absolute inset-0 flex flex-col items-center justify-center rounded-full"
                >
                  <span
                    id="tb-mainTimer"
                    class="font-mono font-bold tracking-tighter primary-text timer-display is-go"
                    >GO</span
                  >
                </button>
              </div>
            </div>
            <div
              class="view-bottom-half h-[45%] md:h-full w-full md:w-1/2 flex flex-col shrink-0 md:border-l app-border px-4 pt-4"
            >
              <div class="flex justify-between items-center mb-4">
                <h3
                  class="text-xs font-bold app-text-sec uppercase tracking-wider"
                >
                  My Workouts
                </h3>
                <button
                  id="tb-openModalBtn"
                  class="primary-text font-bold text-sm"
                >
                  + New
                </button>
              </div>
              <div
                id="tb-workoutsList"
                class="flex-1 overflow-y-auto no-scrollbar"
              ></div>
            </div>
          </div>

          <!-- SETTINGS VIEW (Оставляем как есть, на весь экран) -->
          <div
            id="view-settings"
            inert
            class="absolute inset-0 flex flex-col overflow-y-auto no-scrollbar opacity-0 pointer-events-none transition-opacity duration-300 px-6"
          >
            <div class="shrink-0 flex items-center justify-center mb-6 mt-12">
              <h2
                class="text-sm font-bold app-text-sec uppercase tracking-widest"
              >
                Settings
              </h2>
            </div>
            <!-- Тут ваши настройки... -->
            <div class="app-surface rounded-2xl p-4 border app-border">
              <p class="app-text-sec text-sm text-center">
                Settings configuration here...
              </p>
            </div>
          </div>
        </main>

        <!-- НИЖНЯЯ НАВИГАЦИЯ -->
        <nav class="app-nav-safe">
          <button
            data-nav="stopwatch"
            class="flex flex-col items-center gap-1 group"
          >
            <svg
              class="w-7 h-7 text-gray-400 group-hover:primary-text transition-colors"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              stroke-width="2"
            >
              <circle cx="12" cy="13" r="8"></circle>
              <path d="M12 9v4l2 2"></path>
            </svg>
            <span
              class="text-[10px] font-bold text-gray-400 group-hover:primary-text"
              >Stopwatch</span
            >
          </button>
          <button
            data-nav="timer"
            class="flex flex-col items-center gap-1 group"
          >
            <svg
              class="w-7 h-7 text-gray-400 group-hover:primary-text transition-colors"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span
              class="text-[10px] font-bold text-gray-400 group-hover:primary-text"
              >Timer</span
            >
          </button>
          <button
            data-nav="tabata"
            class="flex flex-col items-center gap-1 group"
          >
            <svg
              class="w-7 h-7 text-gray-400 group-hover:primary-text transition-colors"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M13 6l-6 6h5l-1 6 6-7h-5l1-6z"></path>
            </svg>
            <span
              class="text-[10px] font-bold text-gray-400 group-hover:primary-text"
              >Tabata</span
            >
          </button>
          <button
            data-nav="settings"
            class="flex flex-col items-center gap-1 group"
          >
            <svg
              class="w-7 h-7 text-gray-400 group-hover:primary-text transition-colors"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="3"></circle>
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
              ></path>
            </svg>
            <span
              class="text-[10px] font-bold text-gray-400 group-hover:primary-text"
              >Settings</span
            >
          </button>
        </nav>
      </div>
    </div>

    <script type="module" src="./scripts.js"></script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
