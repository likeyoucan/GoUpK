<!doctype html>
<html lang="en" class="h-full overflow-hidden select-none">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover"
    />
    <!-- Цвет статус-бара -->
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#f3f4f6"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#000000"
    />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta
      name="description"
      content="Stopwatch Pro - Browser based timer and Tabata interval app"
    />

    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />

    <title>Stopwatch Pro</title>

    <!-- Предварительная установка темы (предотвращает мерцание) -->
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme-mode") || "system";
        const isDark =
          savedTheme === "dark" ||
          (savedTheme === "system" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (isDark) document.documentElement.classList.add("dark");
        document.documentElement.classList.add("js");
      })();
    </script>

    <!-- Скомпилированные стили Tailwind 4 -->
    <link rel="stylesheet" href="styles.css" />

    <style>
      /* Системные фиксы для Mobile WebView */
      :root {
        --primary-color: #22c55e; /* Дефолтный цвет до загрузки JS */
      }
      body {
        position: fixed;
        width: 100%;
        height: 100%;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
      }
      .no-js-warning {
        display: none;
      }
      html:not(.js) .no-js-warning {
        display: flex !important;
      }
      html:not(.js) #app {
        display: none !important;
      }

      /* Поддержка безопасных зон (Safe Areas) */
      .app-nav-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .view-top-half {
        padding-top: env(safe-area-inset-top);
      }

      /* Скрытие скроллбара */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>

  <body
    class="preload flex items-center justify-center bg-black text-base antialiased"
  >
    <!-- No-JS Fallback -->
    <div
      class="no-js-warning fixed inset-0 bg-white text-black p-6 flex flex-col items-center justify-center text-center z-[200]"
    >
      <span class="text-4xl mb-4">⚠️</span>
      <h1 class="text-xl font-bold">JavaScript Required</h1>
      <p>Please enable JavaScript to use Stopwatch Pro.</p>
    </div>

    <!-- accessibility announcer -->
    <div id="sr-only-announce" aria-live="polite" class="sr-only"></div>

    <!-- Toast Notifications -->
    <div
      id="toast"
      role="status"
      aria-live="polite"
      class="fixed top-12 left-1/2 transform -translate-x-1/2 app-surface border app-border app-text px-6 py-3 rounded-full shadow-2xl z-[150] transition-all duration-300 opacity-0 -translate-y-4 pointer-events-none flex items-center gap-3"
    >
      <svg
        class="w-5 h-5 primary-text"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        stroke-width="2.5"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M5 13l4 4L19 7"
        ></path>
      </svg>
      <span id="toast-msg" class="font-bold text-sm tracking-wide"></span>
    </div>

    <!-- MAIN APP CONTAINER -->
    <div
      id="app"
      class="relative w-full max-w-md mx-auto h-[100dvh] flex flex-col bg-black transition-shadow duration-300 overflow-hidden"
    >
      <div
        class="app-bg absolute inset-0 flex flex-col w-full h-full z-0 transition-colors duration-300"
      >
        <main class="flex-1 relative overflow-hidden z-10" id="viewsContainer">
          <!-- STOPWATCH VIEW -->
          <section
            id="view-stopwatch"
            class="absolute inset-0 flex flex-col transition-opacity duration-300 z-10"
          >
            <div
              class="view-top-half w-full flex flex-col items-center justify-center shrink-0 px-6 pt-4"
            >
              <h2
                class="text-sm font-bold app-text-sec uppercase tracking-widest mb-4"
                data-i18n="stopwatch"
              >
                Stopwatch
              </h2>
              <div
                class="timer-circle-wrap relative shrink-0 flex items-center justify-center"
                data-ring="sw"
              >
                <button
                  type="button"
                  id="sw-startStopBtn"
                  aria-label="Start or Stop"
                  class="absolute inset-0 flex flex-col items-center justify-center rounded-full focus:outline-none focus-visible:ring-4 focus-visible:ring-[var(--primary-color)] active:scale-95 transition-transform overflow-hidden"
                >
                  <div
                    id="sw-lapFlash"
                    class="absolute inset-0 rounded-full primary-bg opacity-0 pointer-events-none"
                  ></div>
                  <span
                    id="sw-statusText"
                    aria-live="assertive"
                    data-i18n="pause"
                    class="hidden text-sm font-bold tracking-widest uppercase mb-1 app-text-sec relative z-10"
                    >PAUSE</span
                  >
                  <span
                    id="sw-mainDisplay"
                    class="font-mono font-bold tracking-tighter tabular-nums primary-text timer-display relative z-10"
                    >00:00.00</span
                  >
                  <span
                    id="sw-extendedDisplay"
                    class="hidden font-bold app-text-sec text-sm mt-1 relative z-10"
                  ></span>
                </button>
              </div>
            </div>

            <div
              class="view-bottom-half h-[45%] w-full flex flex-col shrink-0 min-h-0"
            >
              <div class="w-full flex justify-center h-14 shrink-0 mb-4 mt-4">
                <button
                  type="button"
                  id="sw-lapBtn"
                  data-i18n="lap"
                  class="hidden app-surface app-text w-32 min-h-[48px] rounded-full text-lg font-bold shadow-md active:scale-95 transition-transform"
                >
                  Lap
                </button>
              </div>
              <div
                class="flex-1 flex flex-col min-h-0 border-t app-border pt-2 px-4"
              >
                <div class="flex justify-between items-center mb-1 shrink-0">
                  <h3
                    class="text-xs font-bold app-text-sec uppercase tracking-wider"
                    data-i18n="laps_history"
                  >
                    Laps History
                  </h3>
                  <div class="flex items-center gap-1">
                    <button
                      type="button"
                      id="sw-saveBtn"
                      class="hidden p-2 text-gray-400 hover:primary-text transition-colors"
                    >
                      <svg
                        class="w-5 h-5"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                        stroke-width="2"
                      >
                        <path
                          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
                        ></path>
                      </svg>
                    </button>
                    <button
                      type="button"
                      id="sw-openResultsBtn"
                      class="p-2 text-gray-400 hover:primary-text transition-colors"
                    >
                      <svg
                        class="w-5 h-5"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                        stroke-width="2"
                      >
                        <path
                          d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"
                        ></path>
                      </svg>
                    </button>
                  </div>
                </div>
                <div
                  id="sw-lapsContainer"
                  class="flex-1 overflow-y-auto no-scrollbar pb-24"
                >
                  <div
                    class="text-center app-text-sec opacity-50 mt-4 text-sm"
                    data-i18n="no_laps"
                  >
                    No laps recorded
                  </div>
                </div>
              </div>
            </div>
          </section>

          <!-- TIMER VIEW -->
          <section
            id="view-timer"
            inert
            aria-hidden="true"
            class="absolute inset-0 flex flex-col transition-opacity duration-300 opacity-0 pointer-events-none"
          >
            <div
              class="view-top-half w-full flex flex-col items-center justify-center shrink-0 px-6 pt-4"
            >
              <h2
                class="text-sm font-bold app-text-sec uppercase tracking-widest mb-4"
                data-i18n="countdown"
              >
                Countdown
              </h2>
              <div
                class="timer-circle-wrap relative shrink-0 flex items-center justify-center"
                data-ring="tm"
              >
                <button
                  type="button"
                  id="tm-circleBtn"
                  class="absolute inset-0 flex flex-col items-center justify-center rounded-full active:scale-95 transition-transform"
                >
                  <span
                    id="tm-statusText"
                    class="hidden text-sm font-bold tracking-widest uppercase mb-1 app-text-sec"
                    data-i18n="pause"
                    >PAUSE</span
                  >
                  <span
                    id="tm-mainDisplay"
                    class="font-mono font-bold tracking-tighter tabular-nums primary-text timer-display"
                    >00:00:00</span
                  >
                </button>
              </div>
            </div>
            <div
              class="view-bottom-half h-[45%] w-full flex flex-col items-center pt-6 px-6"
            >
              <form id="tm-form" class="flex items-center gap-2">
                <input
                  type="text"
                  inputmode="numeric"
                  pattern="[0-9]*"
                  id="tm-h"
                  placeholder="00"
                  class="timer-input w-16 h-16 text-center text-3xl bg-transparent border-b-2 app-border outline-none font-mono"
                />
                <span class="text-2xl opacity-30">:</span>
                <input
                  type="text"
                  inputmode="numeric"
                  pattern="[0-9]*"
                  id="tm-m"
                  placeholder="00"
                  class="timer-input w-16 h-16 text-center text-3xl bg-transparent border-b-2 app-border outline-none font-mono"
                />
                <span class="text-2xl opacity-30">:</span>
                <input
                  type="text"
                  inputmode="numeric"
                  pattern="[0-9]*"
                  id="tm-s"
                  placeholder="00"
                  class="timer-input w-16 h-16 text-center text-3xl bg-transparent border-b-2 app-border outline-none font-mono"
                />
              </form>
              <button
                type="button"
                id="tm-resetBtn"
                data-i18n="reset"
                class="hidden mt-8 text-red-500 font-bold uppercase tracking-widest"
              >
                Reset
              </button>
            </div>
          </section>

          <!-- TABATA VIEW -->
          <section
            id="view-tabata"
            inert
            aria-hidden="true"
            class="absolute inset-0 flex flex-col transition-opacity duration-300 opacity-0 pointer-events-none"
          >
            <div
              class="view-top-half w-full flex flex-col items-center justify-center shrink-0 px-6 pt-4"
            >
              <h2
                class="text-sm font-bold app-text-sec uppercase tracking-widest mb-4"
                data-i18n="tabata_interval"
              >
                Tabata
              </h2>
              <div
                class="timer-circle-wrap relative shrink-0 flex items-center justify-center"
                data-ring="tb"
              >
                <button
                  type="button"
                  id="tb-startBtn"
                  class="absolute inset-0 flex flex-col items-center justify-center rounded-full"
                >
                  <span
                    id="tb-mainTimer"
                    class="font-mono font-bold tracking-tighter tabular-nums primary-text timer-display"
                    >READY</span
                  >
                </button>
              </div>
            </div>
            <div class="view-bottom-half h-[45%] w-full flex flex-col px-4">
              <div class="flex justify-between items-center mb-4">
                <h3
                  class="text-xs font-bold app-text-sec uppercase"
                  data-i18n="my_workouts"
                >
                  Workouts
                </h3>
                <button
                  type="button"
                  id="tb-openModalBtn"
                  class="primary-text font-bold text-sm"
                >
                  + NEW
                </button>
              </div>
              <div
                id="tb-workoutsList"
                class="flex-1 overflow-y-auto no-scrollbar pb-24"
              ></div>
            </div>
          </section>

          <!-- SETTINGS VIEW -->
          <section
            id="view-settings"
            inert
            aria-hidden="true"
            class="absolute inset-0 flex flex-col overflow-y-auto no-scrollbar opacity-0 pointer-events-none transition-opacity duration-300 px-4"
          >
            <div
              class="view-top-half shrink-0 flex items-center justify-center h-16 mb-4"
            >
              <h2
                class="text-sm font-bold app-text-sec uppercase tracking-widest"
                data-i18n="settings"
              >
                Settings
              </h2>
            </div>
            <div class="space-y-6 pb-32">
              <!-- Appearance Section -->
              <div
                class="app-surface rounded-2xl border app-border overflow-hidden"
              >
                <div
                  class="p-4 flex items-center justify-between border-b app-border"
                >
                  <span class="app-text font-medium" data-i18n="theme"
                    >Theme</span
                  >
                  <div class="flex bg-black/5 dark:bg-white/5 rounded-lg p-1">
                    <button
                      class="px-3 py-1 rounded text-xs font-bold"
                      data-theme-mode="light"
                    >
                      Light
                    </button>
                    <button
                      class="px-3 py-1 rounded text-xs font-bold"
                      data-theme-mode="dark"
                    >
                      Dark
                    </button>
                    <button
                      class="px-3 py-1 rounded text-xs font-bold"
                      data-theme-mode="system"
                    >
                      Auto
                    </button>
                  </div>
                </div>
                <div class="p-4">
                  <span
                    class="block app-text font-medium mb-3"
                    data-i18n="accent_color"
                    >Accent Color</span
                  >
                  <div
                    class="flex gap-3 overflow-x-auto no-scrollbar"
                    id="accent-colors"
                  >
                    <!-- JS will populate or keep your static buttons here -->
                  </div>
                </div>
              </div>

              <!-- General Section -->
              <div
                class="app-surface rounded-2xl border app-border overflow-hidden"
              >
                <div
                  class="p-4 flex items-center justify-between border-b app-border"
                >
                  <label class="app-text font-medium" data-i18n="language"
                    >Language</label
                  >
                  <select
                    id="langSelect"
                    class="bg-transparent font-bold text-sm outline-none"
                  >
                    <option value="en">English</option>
                    <option value="ru">Русский</option>
                  </select>
                </div>
                <div class="p-4 flex items-center justify-between">
                  <span class="app-text font-medium" data-i18n="sound"
                    >Sound</span
                  >
                  <label
                    class="relative inline-flex items-center cursor-pointer"
                  >
                    <input type="checkbox" id="toggle-sound" class="sr-only" />
                    <div
                      class="w-11 h-6 bg-gray-600 rounded-full transition-colors"
                    ></div>
                  </label>
                </div>
              </div>

              <button
                id="btn-open-reset"
                class="w-full p-4 text-red-500 font-bold text-sm uppercase tracking-widest"
                data-i18n="reset_settings"
              >
                Reset to Defaults
              </button>
            </div>
          </section>
        </main>

        <!-- BOTTOM NAVIGATION -->
        <nav
          class="absolute bottom-0 w-full h-20 flex justify-around items-center px-4 app-surface z-30 border-t app-border app-nav-safe"
        >
          <button
            type="button"
            data-nav="stopwatch"
            class="nav-btn group flex flex-col items-center gap-1"
          >
            <svg
              class="w-6 h-6 text-gray-400 group-[.active]:primary-text"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="13" r="8"></circle>
              <path d="M12 9v4l2 2"></path>
            </svg>
            <span
              class="text-[10px] font-bold text-gray-400 group-[.active]:primary-text uppercase"
              data-i18n="stopwatch"
              >Stopwatch</span
            >
          </button>
          <button
            type="button"
            data-nav="timer"
            class="nav-btn group flex flex-col items-center gap-1"
          >
            <svg
              class="w-6 h-6 text-gray-400 group-[.active]:primary-text"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span
              class="text-[10px] font-bold text-gray-400 group-[.active]:primary-text uppercase"
              data-i18n="timer"
              >Timer</span
            >
          </button>
          <button
            type="button"
            data-nav="tabata"
            class="nav-btn group flex flex-col items-center gap-1"
          >
            <svg
              class="w-6 h-6 text-gray-400 group-[.active]:primary-text"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M13 6l-6 6h5l-1 6 6-7h-5l1-6z"></path>
            </svg>
            <span
              class="text-[10px] font-bold text-gray-400 group-[.active]:primary-text uppercase"
              data-i18n="tabata"
              >Tabata</span
            >
          </button>
          <button
            type="button"
            data-nav="settings"
            class="nav-btn group flex flex-col items-center gap-1"
          >
            <svg
              class="w-6 h-6 text-gray-400 group-[.active]:primary-text"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="3"></circle>
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
              ></path>
            </svg>
            <span
              class="text-[10px] font-bold text-gray-400 group-[.active]:primary-text uppercase"
              data-i18n="settings"
              >Settings</span
            >
          </button>
        </nav>

        <!-- MODALS (Bottom Sheets) -->
        <div
          id="sw-sessions-modal"
          inert
          aria-hidden="true"
          class="hidden fixed inset-x-0 bottom-0 z-[100] app-surface rounded-t-[2rem] border-t app-border shadow-2xl transition-transform duration-300 translate-y-full flex flex-col max-h-[85dvh]"
        >
          <div
            class="w-12 h-1.5 bg-gray-500/30 rounded-full mx-auto my-3"
          ></div>
          <div class="p-6 overflow-y-auto no-scrollbar">
            <h2 class="text-2xl font-bold mb-4" data-i18n="saved_results">
              Saved Results
            </h2>
            <div id="sw-sessionsList" class="space-y-3"></div>
            <button
              type="button"
              id="sw-closeResultsBtn"
              class="w-full mt-6 p-4 font-bold uppercase"
              data-i18n="close"
            >
              Close
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Capacitor & Main JS -->
    <script src="capacitor.js"></script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
