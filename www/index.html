<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#f3f4f6"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#000000"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="description" content="Stopwatch Pro - Timer and Tabata app" />

    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />

    <title>Stopwatch Pro</title>

    <script>
      // Инициализация темы до отрисовки
      (function () {
        const savedTheme = localStorage.getItem("theme-mode") || "system";
        const isDark =
          savedTheme === "dark" ||
          (savedTheme === "system" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (isDark) document.documentElement.classList.add("dark");
        document.documentElement.classList.add("js");
      })();
    </script>

    <style>
      html.js .no-js-warning {
        display: none !important;
      }
      html:not(.js) #app {
        display: none !important;
      }
      /* Технические правки для WebView */
      .app-nav-safe {
        padding-bottom: calc(0.5rem + env(safe-area-inset-bottom));
      }
      .view-top-half {
        padding-top: env(safe-area-inset-top);
      }
    </style>

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body
    class="preload flex items-center justify-center h-[100dvh] w-full overflow-hidden bg-black text-base select-none antialiased"
  >
    <div
      class="no-js-warning bg-white text-black p-6 rounded-2xl font-bold shadow-2xl text-center max-w-sm mx-4 absolute z-[200]"
    >
      <span class="text-2xl block mb-2">⚠️</span>
      Please enable JavaScript to use Stopwatch Pro.
    </div>

    <div id="sr-only-announce" aria-live="polite" class="sr-only"></div>

    <!-- TOAST -->
    <div
      id="toast"
      role="status"
      aria-live="polite"
      class="fixed top-8 left-1/2 transform -translate-x-1/2 app-surface border app-border app-text px-6 py-3 rounded-full shadow-2xl z-[150] transition-all duration-300 opacity-0 -translate-y-4 pointer-events-none flex items-center gap-3"
    >
      <svg
        class="w-5 h-5 primary-text"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        stroke-width="2.5"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M5 13l4 4L19 7"
        ></path>
      </svg>
      <span id="toast-msg" class="font-bold text-sm tracking-wide"></span>
    </div>

    <div
      id="app"
      class="relative w-full max-w-md mx-auto h-full overflow-hidden flex flex-col bg-black transition-shadow duration-300"
    >
      <div
        class="app-bg absolute inset-0 flex flex-col w-full h-full z-0 transition-colors duration-300"
      >
        <main class="flex-1 relative overflow-hidden z-10" id="viewsContainer">
          <!-- STOPWATCH VIEW -->
          <div
            id="view-stopwatch"
            class="absolute inset-0 flex flex-col transition-opacity duration-300 z-10"
          >
            <div
              class="view-top-half w-full flex flex-col items-center justify-center shrink-0 px-6"
            >
              <h2
                class="text-sm font-bold app-text-sec uppercase tracking-widest"
                data-i18n="stopwatch"
              >
                Stopwatch
              </h2>
              <div
                class="timer-circle-wrap relative shrink-0 flex items-center justify-center"
                data-ring="sw"
              >
                <button
                  type="button"
                  id="sw-startStopBtn"
                  class="absolute inset-0 flex flex-col items-center justify-center rounded-full focus:outline-none focus-visible:ring-4 focus-visible:ring-[var(--primary-color)] active:scale-95 transition-transform overflow-hidden cursor-pointer"
                >
                  <div
                    id="sw-lapFlash"
                    class="absolute inset-0 rounded-full primary-bg opacity-0 pointer-events-none"
                  ></div>
                  <span
                    id="sw-statusText"
                    aria-live="assertive"
                    data-i18n="pause"
                    class="hidden text-sm font-bold tracking-widest uppercase mb-1 app-text-sec relative z-10"
                    >PAUSE</span
                  >
                  <span
                    id="sw-mainDisplay"
                    class="font-mono font-bold tracking-tighter tabular-nums primary-text timer-display is-go relative z-10 selectable-data"
                    >GO</span
                  >
                  <span
                    id="sw-extendedDisplay"
                    class="hidden font-bold app-text-sec text-sm mt-1 relative z-10"
                  ></span>
                </button>
              </div>
            </div>

            <div
              class="view-bottom-half h-[45%] w-full flex flex-col shrink-0 min-h-0"
            >
              <div class="w-full flex justify-center h-14 shrink-0 mb-2 mt-2">
                <button
                  type="button"
                  id="sw-lapBtn"
                  data-i18n="lap"
                  class="hidden app-surface app-text w-32 min-h-[44px] rounded-full text-lg font-bold shadow-sm active:scale-95 transition-transform"
                >
                  Lap
                </button>
              </div>
              <div
                class="flex-1 flex flex-col min-h-0 border-t app-border pt-2 px-2 sm:px-4"
              >
                <div
                  class="flex justify-between items-center mb-1 px-2 shrink-0"
                >
                  <h3
                    class="text-xs font-bold app-text-sec uppercase tracking-wider"
                    data-i18n="laps_history"
                  >
                    Laps History
                  </h3>
                  <div class="flex items-center gap-1">
                    <button
                      type="button"
                      id="sw-saveBtn"
                      class="hidden flex items-center justify-center min-w-[44px] min-h-[44px] text-gray-400 hover:primary-text transition-colors rounded-lg"
                    >
                      <svg
                        class="w-5 h-5"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                        stroke-width="2"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
                        ></path>
                      </svg>
                    </button>
                    <button
                      type="button"
                      id="sw-openResultsBtn"
                      class="flex items-center justify-center min-w-[44px] min-h-[44px] text-gray-400 hover:primary-text transition-colors rounded-lg"
                    >
                      <svg
                        class="w-5 h-5"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                        stroke-width="2"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"
                        ></path>
                      </svg>
                    </button>
                  </div>
                </div>
                <div
                  id="sw-lapsContainer"
                  class="flex-1 overflow-y-auto no-scrollbar px-1 pb-28 selectable-data"
                >
                  <div
                    class="text-center app-text-sec opacity-50 mt-4 text-sm"
                    data-i18n="no_laps"
                  >
                    No laps recorded
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- TIMER VIEW -->
          <div
            id="view-timer"
            inert
            aria-hidden="true"
            class="absolute inset-0 flex flex-col transition-opacity duration-300 opacity-0 pointer-events-none"
          >
            <div
              class="view-top-half w-full flex flex-col items-center justify-center shrink-0 px-6"
            >
              <h2
                class="text-sm font-bold app-text-sec uppercase tracking-widest"
                data-i18n="countdown"
              >
                Countdown
              </h2>
              <div
                class="timer-circle-wrap relative shrink-0 flex items-center justify-center"
                data-ring="tm"
              >
                <button
                  type="button"
                  id="tm-circleBtn"
                  class="absolute inset-0 flex flex-col items-center justify-center rounded-full active:scale-95 transition-transform"
                >
                  <span
                    id="tm-statusText"
                    class="hidden text-sm font-bold tracking-widest uppercase mb-1 app-text-sec"
                    data-i18n="pause"
                    >PAUSE</span
                  >
                  <span
                    id="tm-mainDisplay"
                    class="font-mono font-bold tracking-tighter tabular-nums primary-text timer-display is-go"
                    >GO</span
                  >
                </button>
              </div>
            </div>
            <div
              class="view-bottom-half h-[45%] w-full flex flex-col items-center justify-start pt-6 shrink-0 px-6"
            >
              <form id="tm-form" class="flex items-center gap-2">
                <input
                  type="text"
                  inputmode="numeric"
                  pattern="[0-9]*"
                  id="tm-h"
                  placeholder="00"
                  class="timer-input w-16 h-16 text-center text-[32px] bg-transparent border-b-2 app-border outline-none font-mono"
                />
                <span class="text-4xl opacity-30 pb-5">:</span>
                <input
                  type="text"
                  inputmode="numeric"
                  pattern="[0-9]*"
                  id="tm-m"
                  placeholder="00"
                  class="timer-input w-16 h-16 text-center text-[32px] bg-transparent border-b-2 app-border outline-none font-mono"
                />
                <span class="text-4xl opacity-30 pb-5">:</span>
                <input
                  type="text"
                  inputmode="numeric"
                  pattern="[0-9]*"
                  id="tm-s"
                  placeholder="00"
                  class="timer-input w-16 h-16 text-center text-[32px] bg-transparent border-b-2 app-border outline-none font-mono"
                />
              </form>
              <button
                type="button"
                id="tm-resetBtn"
                data-i18n="reset"
                class="hidden app-surface app-text w-32 min-h-[44px] rounded-full text-lg font-bold shadow-sm active:scale-95 transition-transform text-red-500 mt-6"
              >
                Reset
              </button>
            </div>
          </div>

          <!-- TABATA VIEW -->
          <div
            id="view-tabata"
            inert
            aria-hidden="true"
            class="absolute inset-0 flex flex-col transition-opacity duration-300 opacity-0 pointer-events-none"
          >
            <div
              class="view-top-half w-full flex flex-col items-center justify-center shrink-0 px-6"
            >
              <h2
                class="text-sm font-bold app-text-sec uppercase tracking-widest"
                data-i18n="tabata_interval"
              >
                Tabata
              </h2>
              <div
                class="timer-circle-wrap relative shrink-0 flex items-center justify-center"
                data-ring="tb"
              >
                <button
                  type="button"
                  id="tb-startBtn"
                  class="absolute inset-0 flex flex-col items-center justify-center rounded-full"
                >
                  <span
                    id="tb-mainTimer"
                    class="font-mono font-bold tracking-tighter tabular-nums primary-text timer-display is-go"
                    >GO</span
                  >
                </button>
              </div>
            </div>
            <div
              class="view-bottom-half h-[45%] w-full flex flex-col shrink-0 min-h-0"
            >
              <div
                id="tb-list-section"
                class="flex-1 flex flex-col min-h-0 px-4"
              >
                <div class="flex justify-between items-center mb-2 shrink-0">
                  <h3
                    class="text-xs font-bold app-text-sec uppercase tracking-wider"
                    data-i18n="my_workouts"
                  >
                    Workouts
                  </h3>
                  <button
                    type="button"
                    id="tb-openModalBtn"
                    class="text-sm font-bold primary-text uppercase"
                    data-i18n="create_new"
                  >
                    + New
                  </button>
                </div>
                <div
                  id="tb-workoutsList"
                  class="flex-1 overflow-y-auto no-scrollbar pb-28"
                ></div>
              </div>
            </div>
          </div>

          <!-- SETTINGS VIEW -->
          <div
            id="view-settings"
            inert
            aria-hidden="true"
            class="absolute inset-0 flex flex-col overflow-y-auto no-scrollbar opacity-0 pointer-events-none transition-opacity duration-300"
          >
            <div
              class="view-top-half shrink-0 h-16 mt-6 flex items-center justify-center"
            >
              <h2
                class="text-sm font-bold app-text-sec uppercase tracking-widest"
                data-i18n="settings"
              >
                Settings
              </h2>
            </div>
            <div class="space-y-6 pb-28 px-4">
              <div
                class="app-surface rounded-2xl overflow-hidden border app-border"
              >
                <div
                  class="p-4 flex items-center justify-between border-b app-border"
                >
                  <span class="app-text font-medium" data-i18n="theme"
                    >Theme</span
                  >
                  <div class="flex bg-black/5 dark:bg-white/5 rounded-lg p-1">
                    <button
                      class="px-3 py-1 text-xs font-bold"
                      data-theme-mode="light"
                    >
                      Light
                    </button>
                    <button
                      class="px-3 py-1 text-xs font-bold"
                      data-theme-mode="dark"
                    >
                      Dark
                    </button>
                    <button
                      class="px-3 py-1 text-xs font-bold"
                      data-theme-mode="system"
                    >
                      Auto
                    </button>
                  </div>
                </div>
              </div>
              <button
                type="button"
                id="btn-open-reset"
                class="w-full text-red-500 font-bold text-xs uppercase p-4"
                data-i18n="reset_settings"
              >
                Reset to Defaults
              </button>
            </div>
          </div>
        </main>

        <!-- NAVIGATION -->
        <nav
          class="absolute bottom-0 w-full h-20 flex justify-between items-center px-6 app-surface pb-4 z-30 border-t app-border app-nav-safe"
        >
          <button
            type="button"
            data-nav="stopwatch"
            class="nav-btn flex flex-col items-center gap-1 group"
          >
            <svg
              class="w-6 h-6 text-gray-400 group-[.active]:primary-text"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="13" r="8"></circle>
              <path d="M12 9v4l2 2"></path>
            </svg>
            <span
              class="text-[10px] font-bold text-gray-400 group-[.active]:primary-text"
              data-i18n="stopwatch"
              >Stopwatch</span
            >
          </button>
          <button
            type="button"
            data-nav="timer"
            class="nav-btn flex flex-col items-center gap-1 group"
          >
            <svg
              class="w-6 h-6 text-gray-400 group-[.active]:primary-text"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span
              class="text-[10px] font-bold text-gray-400 group-[.active]:primary-text"
              data-i18n="timer"
              >Timer</span
            >
          </button>
          <button
            type="button"
            data-nav="tabata"
            class="nav-btn flex flex-col items-center gap-1 group"
          >
            <svg
              class="w-6 h-6 text-gray-400 group-[.active]:primary-text"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M13 6l-6 6h5l-1 6 6-7h-5l1-6z"></path>
            </svg>
            <span
              class="text-[10px] font-bold text-gray-400 group-[.active]:primary-text"
              data-i18n="tabata"
              >Tabata</span
            >
          </button>
          <button
            type="button"
            data-nav="settings"
            class="nav-btn flex flex-col items-center gap-1 group"
          >
            <svg
              class="w-6 h-6 text-gray-400 group-[.active]:primary-text"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="3"></circle>
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
              ></path>
            </svg>
            <span
              class="text-[10px] font-bold text-gray-400 group-[.active]:primary-text"
              data-i18n="settings"
              >Settings</span
            >
          </button>
        </nav>

        <!-- MODALS (Bottom Sheets) -->
        <div
          id="sw-sessions-modal"
          inert
          aria-hidden="true"
          class="hidden absolute bottom-0 left-0 w-full h-[85dvh] z-[100] app-surface border-t app-border shadow-2xl rounded-t-[2rem] flex-col p-6 transition-transform duration-300 translate-y-full"
        >
          <div
            class="w-12 h-1.5 bg-gray-500/30 rounded-full mx-auto mb-4"
          ></div>
          <h2 class="text-2xl font-bold mb-4" data-i18n="saved_results">
            Saved Results
          </h2>
          <div
            id="sw-sessionsList"
            class="flex-1 overflow-y-auto no-scrollbar"
          ></div>
          <button
            type="button"
            id="sw-closeResultsBtn"
            class="w-full p-4 font-bold primary-text"
          >
            CLOSE
          </button>
        </div>
      </div>
    </div>

    <script src="capacitor.js"></script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
